name: Deploy MLM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /root/Mlm

            echo "Updating code..."
            git fetch origin
            git reset --hard origin/main

            echo "Deploying files..."

            rm -rf /var/www/html/*
            cp -r User/* /var/www/html/

            if [ -f User/.htaccess ]; then
              cp User/.htaccess /var/www/html/
            fi

            if [ -f User/z_db.php ]; then
              cp User/z_db.php /var/www/html/
            fi

            if [ -f User/admin/z_db.php ]; then
              mkdir -p /var/www/html/admin
              cp User/admin/z_db.php /var/www/html/admin/
            fi

            chown -R www-data:www-data /var/www/html
            chmod -R 755 /var/www/html

            systemctl restart apache2

            echo "Deployment completed successfully!"
